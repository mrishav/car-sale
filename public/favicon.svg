<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#888888;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="#000000" rx="15"/>
  
  <!-- Stylized M for McLaren -->
  <path d="M 20 70 L 20 30 L 35 55 L 50 30 L 65 55 L 80 30 L 80 70" 
        stroke="url(#grad)" 
        stroke-width="6" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Accent line -->
  <line x1="15" y1="75" x2="85" y2="75" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
</svg>
